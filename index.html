<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sudoku Battle Arena</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🧩 Sudoku Battle Arena</h1>

    <div id="mode-screen">
        <button onclick="startSingle()">Single Player</button>
        <button onclick="startCompetitive()">Competitive Mode</button>
    </div>



    <div id="single-screen" class="hidden">

        <h2>Single Player Mode</h2>
        <h3>Time: <span id="single-timer">00:00</span></h3>

        <div id="single-board" class="sudoku-board"></div>

        <button onclick="goBack()">⬅ Back</button>

    </div>



    <div id="competitive-screen" class="hidden">

        <h2>⚔ Competitive Zone</h2>
        <h3>Time: <span id="competitive-timer">00:00</span></h3>

        <div class="boards-container">

           
            <div class="player-section">
                <h3>Player 1</h3>
                <p>Score: <span id="score1">0</span></p>
                <p>Lives: <span id="lives1">❤️❤️❤️</span></p>

                <div id="board1" class="sudoku-board"></div>
            </div>


            <div class="player-section">
                <h3>Player 2</h3>
                <p>Score: <span id="score2">0</span></p>
                <p>Lives: <span id="lives2">❤️❤️❤️</span></p>

                <div id="board2" class="sudoku-board"></div>
            </div>

        </div>

        <h2 id="winner-display"></h2>

        <button onclick="goBack()">⬅ Back</button>

    </div>

    <script src="script.js"></script>

</body>
</html>
